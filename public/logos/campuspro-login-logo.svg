<svg width="320" height="280" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="coreG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Soft ambient glow -->
  <circle cx="160" cy="118" r="90" fill="#6366f1" opacity="0.06"/>
  <circle cx="160" cy="118" r="60" fill="#818cf8" opacity="0.05"/>

  <!-- Outer decorative ring -->
  <circle cx="160" cy="118" r="95" fill="none" stroke="url(#lg1)" stroke-width="0.8" opacity="0.18"/>
  <circle cx="160" cy="118" r="75" fill="none" stroke="url(#lg2)" stroke-width="0.8" opacity="0.15"/>

  <!-- Orbit ellipses -->
  <ellipse cx="160" cy="118" rx="88" ry="34" fill="none" stroke="url(#lg2)" stroke-width="1.5" opacity="0.38" transform="rotate(-30 160 118)"/>
  <ellipse cx="160" cy="118" rx="88" ry="34" fill="none" stroke="url(#lg2)" stroke-width="1.5" opacity="0.22" transform="rotate(52 160 118)"/>
  <ellipse cx="160" cy="118" rx="88" ry="34" fill="none" stroke="url(#lg1)" stroke-width="1" opacity="0.14" transform="rotate(12 160 118)"/>

  <!-- Graduation cap accent -->
  <rect x="124" y="60" width="72" height="6" rx="3" fill="url(#lg1)" opacity="0.5"/>
  <rect x="142" y="52" width="36" height="10" rx="3" fill="url(#lg2)" opacity="0.4"/>

  <!-- Core glow halo -->
  <circle cx="160" cy="118" r="38" fill="#6366f1" opacity="0.12" filter="url(#bigglow)"/>

  <!-- Core ball -->
  <circle cx="160" cy="118" r="32" fill="url(#coreG)" filter="url(#glow)"/>
  <circle cx="160" cy="118" r="20" fill="#c7d2fe"/>
  <circle cx="160" cy="118" r="10" fill="white" opacity="0.92"/>

  <!-- Inner shine -->
  <circle cx="154" cy="112" r="4" fill="white" opacity="0.5"/>

  <!-- Orbit dots -->
  <circle cx="66" cy="108" r="6" fill="#22d3ee" filter="url(#glow)" opacity="0.95"/>
  <circle cx="254" cy="128" r="6" fill="#22d3ee" filter="url(#glow)" opacity="0.95"/>
  <circle cx="160" cy="24" r="4.5" fill="#818cf8" filter="url(#glow)" opacity="0.8"/>
  <circle cx="160" cy="212" r="4.5" fill="#818cf8" opacity="0.6"/>
  <circle cx="96" cy="188" r="3.5" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="224" cy="48" r="3.5" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="240" cy="170" r="2.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="80" cy="66" r="2.5" fill="#22d3ee" opacity="0.4"/>

  <!-- "CampusPro" wordmark -->
  <text x="160" y="246" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" letter-spacing="-1" text-anchor="middle" fill="white" opacity="0.96">Campus<tspan fill="url(#wordGrad)">Pro</tspan></text>

  <!-- Tagline -->
  <text x="160" y="268" font-family="'Segoe UI', system-ui, sans-serif" font-size="9.5" letter-spacing="3" text-anchor="middle" fill="rgba(165,180,252,0.35)" font-weight="500">SRM STUDENT HUB</text>
</svg>
